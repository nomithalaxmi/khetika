# Khetika — GitLab CI/CD Pipeline
image: python:3.11-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONPATH: "$CI_PROJECT_DIR"

cache:
  paths:
    - .cache/pip
    - .venv/

before_script:
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install --break-system-packages
      pytest pytest-cov
      ruff flake8 pylint vulture pyupgrade
      mypy
      bandit semgrep
      pip-audit

stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage

# ── Lint ─────────────────────────────────────────────────────────────────────
lint:
  stage: lint
  script:
    - ruff check . --select=E,W,F,I
    - flake8 . --max-line-length=100 --exclude=venv,.venv
    - pylint app.py database.py crop_calendar.py --fail-under=7.0
    - vulture . --min-confidence=80
  allow_failure: false

# ── Format ───────────────────────────────────────────────────────────────────
format:
  stage: format
  script:
    - ruff format --check .
    - pyupgrade --py311-plus app.py database.py crop_calendar.py
  allow_failure: false

# ── Type Check ───────────────────────────────────────────────────────────────
type_check:
  stage: type_check
  script:
    - mypy app.py database.py crop_calendar.py --ignore-missing-imports --strict-optional
  allow_failure: true

# ── Security ─────────────────────────────────────────────────────────────────
security:bandit:
  stage: security
  script:
    - bandit -r . -x venv,.venv -ll
  allow_failure: false

security:dependency_audit:
  stage: security
  script:
    - pip-audit --requirement requirements.txt
  allow_failure: true

security:secret_scan:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source=. --verbose --no-git
  allow_failure: true

# ── Test ─────────────────────────────────────────────────────────────────────
test:
  stage: test
  script:
    - pytest tests/ -v --tb=short
  artifacts:
    reports:
      junit: test-results.xml
    when: always

# ── Coverage ─────────────────────────────────────────────────────────────────
coverage:
  stage: coverage
  script:
    - pytest tests/ --cov=. --cov-report=term-missing --cov-report=xml --cov-fail-under=60
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    when: always
