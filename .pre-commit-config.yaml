# Khetika — Pre-commit Hooks
# Install: pip install pre-commit && pre-commit install

repos:
  # ── Ruff: lint + format ───────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --select=E,W,F,I]
      - id: ruff-format

  # ── Pyupgrade: modernise syntax ──────────────────────────────────────────
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.2
    hooks:
      - id: pyupgrade
        args: [--py311-plus]

  # ── Flake8 ───────────────────────────────────────────────────────────────
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: [--max-line-length=100]

  # ── Mypy: type checking ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --strict-optional]
        files: ^(app|database|crop_calendar)\.py$

  # ── Bandit: security linting ──────────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-ll, -x, venv,.venv]

  # ── Detect-secrets: secret scanning ──────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]

  # ── Pip-audit: dependency security ───────────────────────────────────────
  - repo: https://github.com/pypa/pip-audit
    rev: v2.7.3
    hooks:
      - id: pip-audit
        args: [--requirement, requirements.txt]

  # ── Vulture: dead code ────────────────────────────────────────────────────
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.11
    hooks:
      - id: vulture
        args: [., --min-confidence=80]

  # ── General: trailing whitespace, EOF, YAML/TOML check ───────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
